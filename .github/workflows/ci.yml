name: CI Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: recallai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Ensure file is read properly if it's UTF-16LE, pip usually handles it but just in case:
          python -c "import io; f=io.open('requirements-lock.txt', 'r', encoding='utf-16le'); content=f.read(); io.open('reqs.txt', 'w', encoding='utf-8').write(content)" || cp requirements-lock.txt reqs.txt
          pip install -r reqs.txt
          # pip-audit is not in our lockfile by default (as a test dep), install it explicitly
          pip install pip-audit

      - name: Run pip-audit
        run: |
          pip-audit --ignore-vuln PYSEC-2026-1325

      - name: Run tests
        run: |
          pytest
        env:
          ENV: testing
          JWT_SECRET: test_secret
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/recallai_test
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/recallai_test

      - name: Build Docker Image
        run: |
          docker build -t recallai:latest .
