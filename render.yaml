databases:
  # 1. PostgreSQL Database
  - name: recallai-db
    plan: free
    databaseName: recallai
    user: recallai_user

services:
  # 2. Qdrant Vector Database (Private Service)
  - type: pserv
    name: recallai-qdrant
    runtime: image
    plan: free
    image:
      url: docker.io/qdrant/qdrant:latest
    envVars:
      - key: QDRANT__SERVICE__GRPC_PORT
        value: "6334"

  # 3. Web Service (FastAPI)
  - type: web
    name: recallai-web
    runtime: docker
    plan: free
    dockerfilePath: Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: recallai-db
          property: connectionString
      - key: QDRANT_URL
        value: http://recallai-qdrant:6333
      - key: ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
