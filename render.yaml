databases:
  # 1. PostgreSQL Database
  - name: recallai-db
    plan: free
    databaseName: recallai
    user: recallai_user

services:
  # 2. Web Service (FastAPI)
  - type: web
    name: recallai-web
    runtime: docker
    plan: free
    dockerfilePath: Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: recallai-db
          property: connectionString
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
